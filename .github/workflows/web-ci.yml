name: web-ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Phase 0：package.json 尚未引入（P1-T12 才落地）。
  skeleton-guard:
    name: P0 skeleton guard
    runs-on: ubuntu-latest
    if: hashFiles('package.json') == ''
    steps:
      - uses: actions/checkout@v4
      - name: Notice
        run: |
          echo "::notice title=Phase 0::package.json 尚未引入；待 P1-T12 落地后启用 pnpm test + build + Playwright。"

  test-build:
    name: pnpm test + build
    runs-on: ubuntu-latest
    if: hashFiles('package.json') != ''
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test -- --run

      - name: Build (Next.js)
        run: pnpm build

  playwright-smoke:
    name: Playwright smoke (@smoke)
    runs-on: ubuntu-latest
    needs: test-build
    if: hashFiles('playwright.config.ts') != '' || hashFiles('playwright.config.js') != ''
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run @smoke tests
        run: pnpm exec playwright test --grep @smoke

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
