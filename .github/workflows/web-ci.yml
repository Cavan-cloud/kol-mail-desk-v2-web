name: web-ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

# hashFiles() 在 job-level if 不可用，只能在 step-level if 用 → 全部 step 用 if 守护。
# Phase 0：package.json 尚未引入（P1-T12 才落地），skeleton-guard step 会绿条通过。
# package.json 一旦存在，pnpm test + build 自动接管；playwright.config.* 出现后自动启用 smoke。

jobs:
  ci:
    name: web-ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: P0 skeleton guard (no package.json yet)
        if: hashFiles('package.json') == ''
        run: |
          echo "::notice title=Phase 0::package.json 尚未引入；待 P1-T12 落地后自动启用 pnpm test + build + Playwright。"

      - name: Setup pnpm
        if: hashFiles('package.json') != ''
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install deps
        if: hashFiles('package.json') != ''
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        if: hashFiles('package.json') != ''
        run: pnpm lint

      - name: Type check
        if: hashFiles('package.json') != ''
        run: pnpm typecheck

      - name: Unit tests
        if: hashFiles('package.json') != ''
        run: pnpm test:run

      - name: Build (Next.js)
        if: hashFiles('package.json') != ''
        run: pnpm build

      - name: Install Playwright browsers (chromium)
        if: hashFiles('playwright.config.ts') != '' || hashFiles('playwright.config.js') != '' || hashFiles('playwright.config.mjs') != ''
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright @smoke
        if: hashFiles('playwright.config.ts') != '' || hashFiles('playwright.config.js') != '' || hashFiles('playwright.config.mjs') != ''
        run: pnpm exec playwright test --grep @smoke

      - name: Upload Playwright report
        if: failure() && (hashFiles('playwright.config.ts') != '' || hashFiles('playwright.config.js') != '' || hashFiles('playwright.config.mjs') != '')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: ci
    if: hashFiles('Dockerfile') != ''
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.example.com \
            -t maildesk-web:ci .
